apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientesapp-api
  namespace: clientesapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clientesapp-api
  template:
    metadata:
      labels:
        app: clientesapp-api
    spec:
      containers:
        - name: clientesapp-api
          image: sergiocoti/clientes-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"